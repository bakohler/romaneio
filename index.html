<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santa Rosa Malhas - Controle de Remanejo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

.navbar{
    background:#046393;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
}

.nav-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.nav-left img{
    height:45px;
}

.nav-links span{
    margin-left:25px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    background:#046393;
    color:white;
}

.btn-red{
    background:#c0392b;
}

.btn-green{
    background:#27ae60;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#046393;
    color:white;
}

.status-box{
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
    font-weight:bold;
}

.green{ background:#d4edda; color:#155724; }
.yellow{ background:#fff3cd; color:#856404; }
.red{ background:#f8d7da; color:#721c24; }

</style>
</head>
<body>

<div class="navbar">
    <div class="nav-left">
        <img src="assets/logo.png">
        <strong>Santa Rosa Malhas</strong>
    </div>
    <div class="nav-links">
        <span onclick="mostrarNovo()">Novo Remanejo</span>
        <span onclick="mostrarLista()">Remanejos Cadastrados</span>
    </div>
</div>

<div class="container" id="novo">
    <h2>Novo Remanejo</h2>

    <input type="text" id="cliente" placeholder="Cliente">
    <input type="text" id="filial" placeholder="Filial">
    <input type="text" id="nf" placeholder="NF">
    <input type="number" id="entrada" placeholder="Entrada" oninput="verificarValor()">
    <input type="number" id="saldo" placeholder="Saldo" oninput="verificarValor()">

    <div id="statusBox" class="status-box"></div>

    <button onclick="salvar()">Salvar</button>
</div>

<div class="container" id="lista" style="display:none;">
    <h2>Remanejos Cadastrados</h2>

    <button class="btn-green" onclick="gerarPDFSelecionados()">Gerar PDF Selecionados</button>
    <br><br>

    <table>
        <thead>
            <tr>
                <th>✓</th>
                <th>Cliente</th>
                <th>Filial</th>
                <th>NF</th>
                <th>Entrada</th>
                <th>Saldo</th>
                <th>1%</th>
                <th>Nº Romaneio</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbzLlkVgtNpwghQAWcW5byXBdkR3g5P66oWsOZvlGv76Lm9bw_46HI0EYkLCIgfjBvYR/exec";

/* Navegação */
function mostrarNovo(){
    novo.style.display="block";
    lista.style.display="none";
}

function mostrarLista(){
    novo.style.display="none";
    lista.style.display="block";
    carregarDados();
}

/* Validação */
function verificarValor(){
    let e=parseFloat(entrada.value)||0;
    let s=parseFloat(saldo.value)||0;
    let um=e*0.01;

    statusBox.innerHTML="1% da Entrada: R$ "+um.toFixed(2);

    if(s<um){
        statusBox.className="status-box green";
    }else if(s==um){
        statusBox.className="status-box yellow";
    }else{
        statusBox.className="status-box red";
    }
}

/* Criar */
function salvar(){
    fetch(URL,{
        method:"POST",
        body:JSON.stringify({
            acao:"criar",
            cliente:cliente.value,
            filial:filial.value,
            nf:nf.value,
            entrada:entrada.value,
            saldo:saldo.value
        })
    }).then(()=>location.reload());
}

/* Carregar */
function carregarDados(){
    fetch(URL)
    .then(res=>res.json())
    .then(dados=>{
        tbody.innerHTML="";
        dados.forEach(item=>{
            tbody.innerHTML+=`
            <tr>
                <td><input type="checkbox" class="check"></td>
                <td contenteditable="true">${item.cliente}</td>
                <td contenteditable="true">${item.filial}</td>
                <td contenteditable="true">${item.nf}</td>
                <td contenteditable="true">${item.entrada}</td>
                <td contenteditable="true">${item.saldo}</td>
                <td>${item.umPorCento}</td>
                <td contenteditable="true">${item.romaneio||""}</td>
                <td>
                    <button onclick="editar(this,${item.linha})">Salvar</button>
                    <button class="btn-red" onclick="excluir(${item.linha})">Excluir</button>
                </td>
            </tr>`;
        });
    });
}

/* Editar */
function editar(btn,linha){
    let tr=btn.closest("tr");
    let c=tr.querySelectorAll("td");

    let entradaVal=parseFloat(c[4].innerText)||0;
    let um=entradaVal*0.01;

    fetch(URL,{
        method:"POST",
        body:JSON.stringify({
            acao:"editar",
            linha:linha,
            cliente:c[1].innerText,
            filial:c[2].innerText,
            nf:c[3].innerText,
            entrada:entradaVal,
            saldo:c[5].innerText,
            umPorCento:um,
            romaneio:c[7].innerText
        })
    }).then(()=>{
        alert("Atualizado!");
        carregarDados();
    });
}

/* Excluir */
function excluir(linha){
    if(!confirm("Deseja excluir este registro?")) return;

    fetch(URL,{
        method:"POST",
        body:JSON.stringify({
            acao:"excluir",
            linha:linha
        })
    }).then(()=>{
        alert("Excluído com sucesso!");
        carregarDados();
    });
}

/* PDF */
async function gerarPDFSelecionados(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let checks=document.querySelectorAll(".check:checked");

    if(checks.length==0){
        alert("Selecione pelo menos uma linha.");
        return;
    }

    doc.addImage("assets/logo.png","PNG",15,10,40,20);
    doc.setFontSize(18);
    doc.text("Santa Rosa Malhas",70,20);

    let y=50;

    checks.forEach(check=>{
        let tr=check.closest("tr");
        let c=tr.querySelectorAll("td");

        doc.text("Cliente: "+c[1].innerText,15,y);
        doc.text("Filial: "+c[2].innerText,110,y);
        y+=8;

        doc.text("NF: "+c[3].innerText,15,y);
        doc.text("Entrada: "+c[4].innerText,70,y);
        doc.text("Saldo: "+c[5].innerText,130,y);
        y+=8;

        doc.text("1%: "+c[6].innerText,15,y);
        doc.text("Nº Romaneio: "+c[7].innerText,90,y);
        y+=15;

        if(y>270){
            doc.addPage();
            y=20;
        }
    });

    doc.save("Relatorio_Remanejo.pdf");
}

</script>
</body>
</html>
