<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Santa Rosa Malhas - Remanejo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI;background:#f4f6f9}

/* NAVBAR */
nav{
background:#046393;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}
nav img{height:45px}
nav h1{font-size:20px}
nav button{
background:none;
border:none;
color:white;
margin-left:25px;
font-size:15px;
cursor:pointer;
font-weight:500;
}

.container{
max-width:1300px;
margin:40px auto;
padding:20px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

h2{margin-bottom:20px}

input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
width:100%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

#umPorCentoBox{
margin-top:10px;
padding:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
font-size:18px;
background:#e2e8f0;
}

.btn{
margin-top:20px;
padding:10px 15px;
background:#046393;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#046393;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.status-green{color:#16a34a;font-weight:bold}
.status-yellow{color:#f59e0b;font-weight:bold}
.status-red{color:#f97316;font-weight:bold}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
}

.modal-box button{
margin-top:15px;
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.confirm{background:#046393;color:white}
.cancel{background:#ccc}
</style>
</head>
<body>

<nav>
<div style="display:flex;align-items:center;gap:15px">
<img src="assets/logo.png">
<h1>Santa Rosa Malhas</h1>
</div>
<div>
<button onclick="mostrarNovo()">Novo Remanejo</button>
<button onclick="mostrarCadastrados()">Remanejos Salvos</button>
</div>
</nav>

<div class="container">

<div id="novo" class="card">
<h2>Novo Remanejo</h2>

<div class="grid">
<input id="cliente" placeholder="Cliente">
<input id="filial" placeholder="Filial">
<input id="nf" placeholder="NF">
<input id="entrada" type="number" placeholder="Entrada">
<input id="saldo" type="number" placeholder="Saldo">
</div>

<div style="margin-top:20px">
<label><b>1% Permitido:</b></label>
<div id="umPorCentoBox">0,00</div>
</div>

<button class="btn" onclick="salvar()">Salvar</button>
</div>

<div id="cadastrados" class="card" style="display:none">
<h2>Romaneios Salvos</h2>

<button class="btn" onclick="gerarPDF(romaneios)">Gerar PDF</button>

<table>
<thead>
<tr>
<th>Cliente</th>
<th>Filial</th>
<th>NF</th>
<th>Entrada</th>
<th>Saldo</th>
<th>1%</th>
<th>Nº Romaneio</th>
<th>Status</th>
<th>Excluir</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<div id="modal" class="modal">
<div class="modal-box">
<p id="modalTexto"></p>
<button class="confirm" onclick="confirmarSalvar()">Confirmar</button>
<button class="cancel" onclick="fecharModal()">Cancelar</button>
</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtN7wsDMRR4_cv3iU0FsAyKtJ-7Cxuzhe4M-P-iHzeSlXnPhfvftuH8WBf9m8GblSK/exec";

let romaneios=[];
let statusAtual=null;
let dadosTemp=null;

/* ABAS */
function mostrarNovo(){
novo.style.display="block";
cadastrados.style.display="none";
}

function mostrarCadastrados(){
novo.style.display="none";
cadastrados.style.display="block";
carregarDados();
}

/* CALCULO */
function calcular(){
let entrada=parseFloat(document.getElementById("entrada").value)||0;
let saldo=parseFloat(document.getElementById("saldo").value)||0;
let um=entrada*0.01;

umPorCentoBox.innerText=um.toFixed(2);

if(saldo<um){umPorCentoBox.style.background="#dcfce7";statusAtual="verde";}
else if(saldo==um){umPorCentoBox.style.background="#fef9c3";statusAtual="amarelo";}
else{umPorCentoBox.style.background="#fee2e2";statusAtual="vermelho";}
}

entrada.addEventListener("input",calcular);
saldo.addEventListener("input",calcular);

/* SALVAR */
function salvar(){

let dados={
cliente:cliente.value,
filial:filial.value,
nf:nf.value,
entrada:entrada.value,
saldo:saldo.value,
numero:""
};

if(statusAtual==="verde"){
enviarSalvar(dados);
return;
}

dadosTemp=dados;

if(statusAtual==="amarelo"){
modalTexto.innerText="Saldo igual a 1%. Deseja salvar mesmo assim?";
modal.style.display="flex";
}

if(statusAtual==="vermelho"){
modalTexto.innerText="Saldo maior que 1%. Necessário autorização superior. Deseja salvar?";
modal.style.display="flex";
}
}

function confirmarSalvar(){
enviarSalvar(dadosTemp);
fecharModal();
}

function fecharModal(){
modal.style.display="none";
}

function enviarSalvar(dados){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({action:"salvar",dados:dados})
})
.then(res=>res.json())
.then(()=>{
limpar();
carregarDados();
mostrarCadastrados();
});
}

/* CARREGAR */
function carregarDados(){
fetch(SCRIPT_URL+"?action=listar")
.then(res=>res.json())
.then(data=>{
romaneios=data;
render();
});
}

/* RENDER */
function render(){
tbody.innerHTML="";
romaneios.forEach(r=>{
let um=r.entrada*0.01;
let icon="✔";
let classe="status-green";
if(r.saldo==um){icon="=";classe="status-yellow";}
if(r.saldo>um){icon="⚠";classe="status-red";}
tbody.innerHTML+=`
<tr>
<td>${r.cliente}</td>
<td>${r.filial}</td>
<td>${r.nf}</td>
<td>${r.entrada}</td>
<td>${r.saldo}</td>
<td>${um.toFixed(2)}</td>
<td contenteditable="true" onblur="editar('${r.id}',this.innerText)">${r.numero||""}</td>
<td class="${classe}">${icon}</td>
<td><button onclick="excluir('${r.id}')">X</button></td>
</tr>`;
});
}

function editar(id,valor){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({action:"editar",id:id,numero:valor})
}).then(()=>carregarDados());
}

function excluir(id){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({action:"excluir",id:id})
}).then(()=>carregarDados());
}

/* PDF */
function gerarPDF(lista){
if(!lista.length){alert("Nenhum romaneio.");return;}
let container=document.createElement("div");
container.style.padding="30px";
container.innerHTML="<h2>Relatório Santa Rosa Malhas</h2>";
html2pdf().from(container).save();
}

carregarDados();

</script>
</body>
</html>
