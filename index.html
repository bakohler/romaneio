<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santa Rosa Malhas - Controle de Remanejo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

.navbar {
    background: #046393;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    color: white;
}

.logo {
    width: 50px;
}
    
.nav-links span {
    margin-right: 20px;
    cursor: pointer;
    font-weight: bold;
}

.nav-links span:hover {
    text-decoration: underline;
}

.container {
    max-width: 1100px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 15px;
    background: #046393;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #03527a;
}

.status-box {
    padding: 15px;
    border-radius: 6px;
    margin-bottom: 15px;
    font-weight: bold;
}

.green { background: #d4edda; color: #155724; }
.yellow { background: #fff3cd; color: #856404; }
.red { background: #f8d7da; color: #721c24; }

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
}

th {
    background: #046393;
    color: white;
}
</style>
</head>

<body>

<div class="navbar">
    <div><strong>Santa Rosa Malhas</strong></div>
    <img src="assets/logo.png" alt="logo">
    <div class="nav-links">
        <span onclick="mostrarNovo()">Novo Remanejo</span>
        <span onclick="mostrarLista()">Remanejos Cadastrados</span>
    </div>
</div>

<div class="container" id="novo">
    <h2>Novo Remanejo</h2>

    <input type="text" id="cliente" placeholder="Cliente">
    <input type="text" id="filial" placeholder="Cliente Filial">
    <input type="text" id="nf" placeholder="NF">
    <input type="number" id="entrada" placeholder="Entrada" oninput="verificarValor()">
    <input type="number" id="saldo" placeholder="Saldo" oninput="verificarValor()">

    <div id="statusBox" class="status-box"></div>

    <button onclick="salvar()">Salvar</button>
</div>

<div class="container" id="lista" style="display:none;">
    <h2>Remanejos Cadastrados</h2>
    <table id="tabela">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Filial</th>
                <th>NF</th>
                <th>Entrada</th>
                <th>Saldo</th>
                <th>1%</th>
                <th>Nº Romaneio</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxwQRdSabKyRrfcUhBhinqssi7A4qrNgU1C2wL7Zu06w2CUNhhH6MgkSQNC4pOozYRf/exec";

function mostrarNovo(){
    document.getElementById("novo").style.display="block";
    document.getElementById("lista").style.display="none";
}

function mostrarLista(){
    document.getElementById("novo").style.display="none";
    document.getElementById("lista").style.display="block";
    carregarDados();
}

function verificarValor(){
    let entrada = parseFloat(document.getElementById("entrada").value) || 0;
    let saldo = parseFloat(document.getElementById("saldo").value) || 0;
    let umPorCento = entrada * 0.01;

    let box = document.getElementById("statusBox");
    box.innerHTML = "1% da Entrada: R$ " + umPorCento.toFixed(2);

    if(saldo < umPorCento){
        box.className="status-box green";
        box.innerHTML += "<br>Saldo menor que 1% — Autorizado.";
    } else if(saldo == umPorCento){
        box.className="status-box yellow";
        box.innerHTML += "<br>Saldo igual a 1% — Confirmar ao salvar.";
    } else {
        box.className="status-box red";
        box.innerHTML += "<br>Saldo maior que 1% — Necessário autorização superior.";
    }
}

function salvar(){
    let entrada = parseFloat(document.getElementById("entrada").value) || 0;
    let saldo = parseFloat(document.getElementById("saldo").value) || 0;
    let umPorCento = entrada * 0.01;

    if(saldo > umPorCento){
        alert("⚠️ Saldo maior que 1%! Necessário autorização do superior.");
        return;
    }

    if(saldo == umPorCento){
        if(!confirm("Saldo igual a 1%. Deseja realmente salvar?")){
            return;
        }
    }

    const dados = {
        cliente: cliente.value,
        filial: filial.value,
        nf: nf.value,
        entrada: entrada,
        saldo: saldo
    };

    fetch(URL,{
        method:"POST",
        body: JSON.stringify(dados)
    }).then(res=>res.json())
    .then(()=>{
        alert("Salvo com sucesso!");
        location.reload();
    });
}

function carregarDados(){
    fetch(URL)
    .then(res=>res.json())
    .then(dados=>{
        let tbody=document.querySelector("#tabela tbody");
        tbody.innerHTML="";
        dados.forEach((linha,index)=>{
            tbody.innerHTML+=`
                <tr>
                    <td>${linha[0]}</td>
                    <td>${linha[1]}</td>
                    <td>${linha[2]}</td>
                    <td>${linha[3]}</td>
                    <td>${linha[4]}</td>
                    <td>${linha[5]}</td>
                    <td contenteditable="true">${linha[6] || ""}</td>
                    <td>
                        <button onclick="gerarPDF(${index})">PDF</button>
                    </td>
                </tr>
            `;
        });
    });
}

async function gerarPDF(index){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("Santa Rosa Malhas", 20, 20);

    doc.setFontSize(12);
    doc.text("Romaneio de Remanejo", 20, 30);

    doc.text("Registro nº " + (index+1), 20, 45);

    doc.save("romaneio.pdf");
}
</script>

</body>
</html>
